name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: reisekosten-workflow

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker
          
      - name: Deploy to Cloud Run
        env:
          GOOGLE_DRIVE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS_JSON }}
          NOTION_SERVICE_ACCOUNT_JSON: ${{ secrets.NOTION_SERVICE_ACCOUNT_JSON }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          # Base64 encode the credentials to avoid JSON escaping issues
          GOOGLE_DRIVE_CREDENTIALS_B64=$(echo "$GOOGLE_DRIVE_CREDENTIALS_JSON" | base64 | tr -d '\n')

          gcloud run deploy reisekosten-bot \
            --source . \
            --region europe-west1 \
            --allow-unauthenticated \
            --platform managed \
            --project reisekosten-workflow \
            --update-env-vars NOTION_SERVICE_ACCOUNT_JSON="$NOTION_SERVICE_ACCOUNT_JSON",SLACK_BOT_TOKEN="$SLACK_BOT_TOKEN",GOOGLE_DRIVE_CREDENTIALS_B64="$GOOGLE_DRIVE_CREDENTIALS_B64"

      - name: Health Check
        run: |
          SERVICE_URL=$(gcloud run services describe reisekosten-bot --region europe-west1 --project reisekosten-workflow --format='value(status.url)')
          echo "Service deployed at: $SERVICE_URL"
          sleep 10
          curl -s "$SERVICE_URL/health" | jq .
