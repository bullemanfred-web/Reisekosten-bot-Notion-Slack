name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker

      - name: Deploy to Cloud Run
        env:
          GOOGLE_DRIVE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS_JSON }}
        run: |
          gcloud run deploy reisekosten-bot \
            --source . \
            --region europe-west1 \
            --allow-unauthenticated \
            --platform managed \
            --project reisekosten-workflow \
            --update-env-vars GOOGLE_DRIVE_CREDENTIALS_JSON="$GOOGLE_DRIVE_CREDENTIALS_JSON"

      - name: Health Check
        run: |
          SERVICE_URL=$(gcloud run services describe reisekosten-bot --region europe-west1 --project reisekosten-workflow --format='value(status.url)')
          echo "Service deployed at: $SERVICE_URL"
          sleep 10
          curl -s "$SERVICE_URL/health" | jq .
